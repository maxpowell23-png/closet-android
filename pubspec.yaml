name: closet_android
description: CLOSET Android - Flutter app with Firebase and Gemini AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

  dependencies:
    flutter:
        sdk: flutter
          firebase_core: ^2.24.0
            firebase_auth: ^4.17.0
              cloud_firestore: ^4.14.0
                firebase_storage: ^11.6.0
                  google_generative_ai: ^0.4.0
                    riverpod: ^2.4.0
                      riverpod_generator: ^2.3.0
                        go_router: ^13.0.0
                          intl: ^0.19.0
                            image_picker: ^1.0.0
                              cached_network_image: ^3.3.0

                              dev_dependencies:
                                flutter_test:
                                    sdk: flutter
                                      flutter_lints: ^3.0.0
                                        riverpod_generator: ^2.3.0
                                          build_runner: ^2.4.0

                                          flutter:
                                            uses-material-design: true
